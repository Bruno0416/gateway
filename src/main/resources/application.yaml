server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-path
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth,/auth/**
            - id: user-path
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user,/user/**
            - id: agenda-path
              uri: lb://AGENDA-SERVICE
              predicates:
                - Path=/agenda,/agenda/**
            - id: catalog-path
              uri: lb://CATALOG-SERVICE
              predicates:
                - Path=/catalog,/catalog/**
            - id: sales-path
              uri: lb://SALES-SERVICE
              predicates:
                - Path=/sales,/sales/**
            - id: shipping-path
              uri: lb://SHIPPING-SERVICE
              predicates:
                - Path=/shipping,/shipping/**
            - id: cart-path
              uri: lb://CART-SERVICE
              predicates:
                - Path=/cart,/cart/**
            - id: support-path
              uri: lb://SUPPORT-SERVICE
              predicates:
                - Path=/tickets,/tickets/**
            - id: report-path
              uri: lb://REPORT-SERVICE
              predicates:
                - Path=/reportes,/reportes/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
